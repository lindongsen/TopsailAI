# --- FOR AI AGENT
# workspace: /TopsailAI/cli/
# cli: topsailai.py
# unitest_folder: /TopsailAI/cli/tests/unit/topsailai/
# ---

# TopsailAI Configurations for `cli/topsailai.py`

# Task Run
drivers:
  - topsailai_llm_chat
  - topsailai_agent_chat
  - topsailai_agent_plan_task
  - ai-team-flow-dev

# Instruction can only be used within the corresponding scopes
scopes:
  - workspace
  - session
  - runtime

# Describe the meaning of instruction configuration
instructions_helper:
  # > KEYS
  cmd: str, instruction name
  alias: list, instruction's alias name
  scopes: list, the cmd is only working in these scopes
  desc: str, description
  example: str,
  shell: str, If it is empty, it needs to be implemented internally, else execute this command line to get result
  environ: |
    dict, environment variables, default environ:
      TOPSAILAI_SESSION_ID={session_id}
      TOPSAILAI_INTERACTIVE_MODE="0"
  independent_process: |
    bool or int, 1 or true for True.
    Example:
    ```python
    def launch_independent_process(cmd):
        """Start an independent child process that is logically separated from the current process:
            The child process's parent-process-id is not current-process-id."""
        kwargs = {
            'stdin': subprocess.DEVNULL,
            'stdout': subprocess.PIPE,
            'stderr': subprocess.PIPE
        }
        if sys.platform == 'win32':
            # Windows
            kwargs['creationflags'] = subprocess.DETACHED_PROCESS
        else:
            # Linux/macOS
            kwargs['start_new_session'] = True
            kwargs['preexec_fn'] = os.setsid
    ```
  async: bool or int, 1 or true for True, async to execute shell, when async is True, independent_process default is True too.
  use_os_system: bool or int, 1 or true for True, use os.system(shell) to execute shell.

instructions:
  # > Rules:
  # The instructions do not need to start with '/' in these scopes (compatibility): workspace, session
  # Can dynamically recognize variables in the shell, assign values in order, and the format of variables in the shell is {variable-name}
  # After entering a scope, call 'help' only displays instructions related to that scope

  # > SESSION > START
  - cmd: "/cd {session_id}"
    scopes:
      - workspace
    desc: "Entering to session scope; {session_id} can be a number (1-based index from file list) or a session ID string"
    example: "/cd 2 or /cd 20260520T105654"
    shell: ""

  - cmd: "/cd"
    scopes:
      - session
      - project
    desc: "Switch to root workspace scope"
    example: "cd"
    shell: ""

  # After entering a specific session `/cd {session_id}`, these instructions can be executed

  - cmd: "/ctx.search {keyword}"
    scopes:
      - session
    desc: search context messages by keyword
    example: "/ctx.search tool_calls_section"
    shell: "topsailai_agent_call_instruction -s '{session_id}' -i '/ctx.search' -p '{keyword}'"

  - cmd: "/ctx.history"
    alias:
      - history
    scopes:
      - session
    desc: show context messages
    example: ""
    shell: "topsailai_retrieve_messages {session_id}"


  - cmd: "/ctx.btw" # Note: Special handling, supports line breaks
    scopes:
      - session
      - runtime
    desc: "Add a by-the-way message to Agent2LLM runtime inject source"
    example: ""
    shell: "topsailai_session_add_agent2llm_message -s '{session_id}' -m '{message}'"

  - cmd: "/ctx.add_msg" # Note: Special handling, supports line breaks
    scopes:
      - session
    desc: "Add message to context"
    example: ""
    shell: "topsailai_session_add_message -s '{session_id}' -m '{message}'"

  - cmd: "/task.run {driver} {args}"
    scopes:
      - session
    desc: "Run task for the session"
    example: "/task.run ai-team-flow-dev"
    shell: "{driver} {args}"
    environ:
      TOPSAILAI_INTERACTIVE_MODE: "0"
      TOPSAILAI_SESSION_ID: "{session_id}"

  - cmd: "/task.run {driver}"
    scopes:
      - session
    desc: "Run task for the session"
    example: "/task.run ai-team-flow-dev"
    shell: "{driver}"
    environ:
      TOPSAILAI_INTERACTIVE_MODE: "0"
      TOPSAILAI_SESSION_ID: "{session_id}"

  - cmd: "/task.async {driver} {args}"
    scopes:
      - session
    desc: "Run async task for the session"
    example: "/task.async ai-team-flow-dev"
    shell: "{driver} {args}"
    environ:
      TOPSAILAI_INTERACTIVE_MODE: "0"
      TOPSAILAI_SESSION_ID: "{session_id}"
    independent_process: 1
    async: 1

  - cmd: "/task.async {driver}"
    scopes:
      - session
    desc: "Run async task for the session"
    example: "/task.async ai-team-flow-dev"
    shell: "{driver}"
    environ:
      TOPSAILAI_INTERACTIVE_MODE: "0"
      TOPSAILAI_SESSION_ID: "{session_id}"
    independent_process: 1
    async: 1

  - cmd: "/chat {driver}"
    scopes:
      - session
    desc: "Chatting"
    example: ""
    shell: "{driver}"
    environ:
      TOPSAILAI_TASK: ""
      TOPSAILAI_INTERACTIVE_MODE: "0"
      TOPSAILAI_SESSION_ID: "{session_id}"
    use_os_system: 1

  - cmd: "/chat {driver} {args}"
    scopes:
      - session
    desc: "Chatting"
    example: ""
    shell: "{driver} {args}"
    environ:
      TOPSAILAI_INTERACTIVE_MODE: "0"
      TOPSAILAI_SESSION_ID: "{session_id}"
    use_os_system: 1

  - cmd: "/dtach {driver}"
    scopes:
      - session
    desc: "Run async task for the session"
    example: "/dtach ai-team-flow-dev"
    shell: "dtach -A /tmp/topsailai.dtach.{session_id} bash -c {driver}"
    environ:
      TOPSAILAI_INTERACTIVE_MODE: "0"
      TOPSAILAI_SESSION_ID: "{session_id}"
    independent_process: 1
    async: 1

  - cmd: "/dtach"
    scopes:
      - session
    desc: "Run dtach command"
    example: ""
    shell: "dtach -A /tmp/topsailai.dtach.{session_id} bash"
    environ:
      TOPSAILAI_INTERACTIVE_MODE: "0"
      TOPSAILAI_SESSION_ID: "{session_id}"
    use_os_system: 1

  # > SESSION > END

  # /env.get, Get environment variable
  - cmd: "/env.get {key}"
    scopes:
      - workspace
    desc: "Get environment variable"
    example: "/env.get OPENAI_MODEL"
    shell: ""

  # /env.set, Set environment variable
  - cmd: "/env.set {key} {value}"
    scopes:
      - workspace
    desc: "Set environment variable"
    example: "/env.set OPENAI_MODEL DeepSeek-V4-Pro"
    shell: ""

  - cmd: "/log.check"
    scopes:
      - workspace
    desc: "Check log content to find critical events"
    example: ""
    shell: "topsailai_check_log"

  - cmd: "/log.check_for_improvement"
    scopes:
      - workspace
    desc: "Check log content to improve usability"
    example: ""
    shell: |
      bash -c "grep ' ERROR -' ${TOPSAILAI_HOME:-${HOME}/.topsailai}/log/chat.log | grep -v '\- parsing response:' | grep -v '\- Expecting value:' | grep -v '\- LLM Mistake:' | grep -v ' blocking chat '"

  - cmd: "/log.check_for_error"
    scopes:
      - workspace
    desc: "Check log content to improve usability"
    example: ""
    shell: |
      bash -c "grep -E ' ERROR -| CRITICAL -' ${TOPSAILAI_HOME:-${HOME}/.topsailai}/log/chat.log |
        grep ^$(date +%Y-%m-%d) | grep -v RateLimit | grep -v blocking | grep -v ReadError |
        grep -v 'parsing response:' | grep -v 'Expecting value:' | grep -v 'LLM Mistake:'
      "

  # QuickStart
  - cmd: "/chat"
    scopes:
      - workspace
    desc: "Chatting to LLM, NO TOOLS"
    example: ""
    shell: |
      bash -c "TOPSAILAI_SESSION_ID=$(date +%s) topsailai_llm_chats"
    environ:
      DEBUG: "0"
      TOPSAILAI_INTERACTIVE_MODE: "1"
      TOPSAILAI_CLI_NEED_TIPS: "0"
      TOPSAILAI_HOME: "~/.topsailai"
    use_os_system: 1

  - cmd: "/agent"
    scopes:
      - workspace
    desc: "AI-Agent Work Mode"
    example: ""
    shell: |
      bash -c "TOPSAILAI_SESSION_ID=$(date +%s) topsailai_agent_chats"
    environ:
      TOPSAILAI_PLUGIN_SKILLS: "/work/skills"
      DEBUG: "0"
      TOPSAILAI_INTERACTIVE_MODE: "1"
      TOPSAILAI_USE_TOOL_CALLS: "1"
      TOPSAILAI_ENABLE_SESSION_TEE_OUT: "1"
      TOPSAILAI_CLI_NEED_TIPS: "0"
      TOPSAILAI_HOME: "~/.topsailai"
    use_os_system: 1

  - cmd: "/agent_plan"
    scopes:
      - workspace
    desc: "AI-Agent Plan Mode"
    example: ""
    shell: |
      bash -c "TOPSAILAI_SESSION_ID=$(date +%s) topsailai_agent_chats"
    environ:
      TOPSAILAI_ENABLED_TOOLS: "skill_tool,file_readonly_tool,memory_tool,time_tool,multimodal_readonly_tool"
      TOPSAILAI_PLUGIN_SKILLS: "/work/skills"
      DEBUG: "0"
      TOPSAILAI_INTERACTIVE_MODE: "1"
      TOPSAILAI_USE_TOOL_CALLS: "1"
      TOPSAILAI_ENABLE_SESSION_TEE_OUT: "1"
      TOPSAILAI_CLI_NEED_TIPS: "0"
      TOPSAILAI_HOME: "~/.topsailai"
    use_os_system: 1
